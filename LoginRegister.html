<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusIQ</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/loginStyle.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


</head>
<body>

    <div class = "container">
        <div class = "form-box login">
            <form id="loginForm" action="">
                <h1>Login</h1>

                <div class="input-box">
                    <input id="loginEmail" type="email" placeholder="Student Email" required>
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input id="loginPassword" type="password" placeholder="Password" required>
                    <i class="bx bx-lock"></i>
                </div>
                <div class = "forgot-link">
                    <a href="#">Forgot password</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with microsoft</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-microsoft"></i></a>
                </div>

            </form>
        </div>

        <div class = "form-box register">
            <form id="registerForm" action="">
                <h1>Registration</h1>

                <div class="input-box">
                    <input id="firstName" type="text" placeholder="First Name" required>
                </div>
                <div class="input-box">
                    <input id="lastName" type="text" placeholder="Last Name" required>
                </div>
                <div class="input-box">
                    <input id="registerEmail" type="email" placeholder="Student Email" required>
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input id="registerPassword" type="password" placeholder="Password" required>
                    <i class="bx bx-lock"></i>
                </div>
                <div class="input-box">
                    <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
                    <i class="bx bx-lock"></i>
                </div>
                <button type="submit" class="btn">Register</button>

            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>CAMPUSIQ</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/loginScript.js"></script>

</body>
</html>
